    <circle cx="1089" cy="145" r="0.6"/><circle cx="1134" cy="89" r="0.7"/><circle cx="1178" cy="234" r="0.5"/>
    <circle cx="56" cy="145" r="0.5"/><circle cx="112" cy="267" r="0.6"/><circle cx="178" cy="200" r="0.7"/>
    <circle cx="234" cy="112" r="0.5"/><circle cx="301" cy="245" r="0.6"/><circle cx="367" cy="156" r="0.7"/>
    <circle cx="445" cy="34" r="0.5"/><circle cx="523" cy="267" r="0.6"/><circle cx="590" cy="112" r="0.7"/>
    <circle cx="668" cy="178" r="0.5"/><circle cx="746" cy="34" r="0.6"/><circle cx="812" cy="267" r="0.7"/>
    <circle cx="890" cy="89" r="0.5"/><circle cx="968" cy="200" r="0.6"/><circle cx="1023" cy="145" r="0.7"/>
    <circle cx="1101" cy="267" r="0.5"/><circle cx="1156" cy="56" r="0.6"/>
    <circle cx="23" cy="234" r="0.5"/><circle cx="67" cy="78" r="0.6"/><circle cx="134" cy="156" r="0.7"/>
    <circle cx="200" cy="34" r="0.5"/><circle cx="278" cy="189" r="0.6"/><circle cx="345" cy="112" r="0.7"/>
    <circle cx="412" cy="256" r="0.5"/><circle cx="490" cy="178" r="0.6"/><circle cx="568" cy="89" r="0.7"/>
    <circle cx="634" cy="245" r="0.5"/><circle cx="712" cy="56" r="0.6"/><circle cx="790" cy="189" r="0.7"/>
    <circle cx="856" cy="145" r="0.5"/><circle cx="934" cy="23" r="0.6"/><circle cx="1012" cy="267" r="0.7"/>
    <circle cx="1078" cy="89" r="0.5"/><circle cx="1145" cy="200" r="0.6"/><circle cx="1190" cy="112" r="0.7"/>
  </g>

  <!-- Stars layer 2 - medium with glow -->
  <g filter="url(#glow)">
    <circle cx="189" cy="45" r="1.8" fill="#c4b5fd" opacity="0.95"/>
    <circle cx="434" cy="156" r="1.6" fill="#93c5fd" opacity="0.9"/>
    <circle cx="623" cy="89" r="2.0" fill="#6ee7b7" opacity="0.9"/>
    <circle cx="801" cy="223" r="1.7" fill="#c4b5fd" opacity="0.95"/>
    <circle cx="956" cy="67" r="1.9" fill="#fde68a" opacity="0.85"/>
    <circle cx="1101" cy="145" r="1.6" fill="#93c5fd" opacity="0.9"/>
    <circle cx="78" cy="178" r="1.8" fill="#6ee7b7" opacity="0.85"/>
    <circle cx="312" cy="234" r="1.5" fill="#fde68a" opacity="0.8"/>

    <circle cx="760" cy="218" r="2.5"/><circle cx="775" cy="218" r="2.5"/><circle cx="790" cy="218" r="2.5"/><circle cx="805" cy="218" r="2.5"/>
    <circle cx="760" cy="233" r="2.5"/><circle cx="775" cy="233" r="2.5"/><circle cx="790" cy="233" r="2.5"/><circle cx="805" cy="233" r="2.5"/>
    <circle cx="760" cy="248" r="2.5"/><circle cx="775" cy="248" r="2.5"/><circle cx="790" cy="248" r="2.5"/><circle cx="805" cy="248" r="2.5"/>
    <circle cx="760" cy="263" r="2.5"/><circle cx="775" cy="263" r="2.5"/><circle cx="790" cy="263" r="2.5"/><circle cx="805" cy="263" r="2.5"/>

  <!-- Planet system (right side) -->
  <g filter="url(#softglow)" transform="translate(1050,95)">
    <!-- Planet glow aura -->
    <circle cx="0" cy="0" r="52" fill="#4c1d95" opacity="0.12"/>
    <!-- Planet body -->
    <circle cx="0" cy="0" r="42" fill="url(#planetGrad)"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.9"/>
    <!-- Surface bands -->
    <path d="M-35,-14 Q0,-20 35,-14" fill="none" stroke="#4c1d95" stroke-width="2" opacity="0.7"/>
    <path d="M-40,0 Q0,-5 40,0" fill="none" stroke="#3730a3" stroke-width="1.5" opacity="0.5"/>
    <path d="M-38,12 Q0,7 38,12" fill="none" stroke="#4c1d95" stroke-width="1.5" opacity="0.6"/>

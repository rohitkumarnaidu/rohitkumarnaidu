    <rect x="80" y="182" width="66" height="22" rx="11" fill="#1e1b4b" stroke="#4f46e5" stroke-width="0.8"/>
    <text x="113" y="197" text-anchor="middle" fill="#818cf8">⚛ React</text>

    <rect x="156" y="182" width="72" height="22" rx="11" fill="#0f2a1a" stroke="#059669" stroke-width="0.8"/>
    <text x="192" y="197" text-anchor="middle" fill="#34d399">🐍 Python</text>

    <rect x="238" y="182" width="62" height="22" rx="11" fill="#1a1000" stroke="#ea580c" stroke-width="0.8"/>
    <text x="269" y="197" text-anchor="middle" fill="#fb923c">☕ Java</text>

    <rect x="310" y="182" width="74" height="22" rx="11" fill="#0c1a2e" stroke="#2563eb" stroke-width="0.8"/>
    <text x="347" y="197" text-anchor="middle" fill="#60a5fa">⚡ FastAPI</text>

    <rect x="394" y="182" width="64" height="22" rx="11" fill="#1a0a2e" stroke="#7c3aed" stroke-width="0.8"/>
    <text x="426" y="197" text-anchor="middle" fill="#c4b5fd">🤖 AI/ML</text>

    <rect x="468" y="182" width="78" height="22" rx="11" fill="#1a0f00" stroke="#d97706" stroke-width="0.8"/>
    <text x="507" y="197" text-anchor="middle" fill="#fbbf24">🔥 Firebase</text>

    <rect x="556" y="182" width="68" height="22" rx="11" fill="#0a1f2e" stroke="#0891b2" stroke-width="0.8"/>
    <text x="590" y="197" text-anchor="middle" fill="#22d3ee">☁ Cloud</text>
  </g>

  <!-- Location and tagline -->
  <text x="82" y="240" font-family="'Segoe UI',Arial,sans-serif"
    font-size="12" fill="#64748b" letter-spacing="0.5">📍 India</text>
  <text x="82" y="260" font-family="'Segoe UI',Arial,sans-serif"

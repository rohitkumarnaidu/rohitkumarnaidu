    <circle cx="-54" cy="-38" r="2" fill="#1e3a5f" opacity="0.8"/>
  </g>

  <!-- Rocket -->
  <g filter="url(#glow)" transform="translate(870,90) rotate(-35)">
    <ellipse cx="0" cy="0" rx="11" ry="28" fill="#1e3a5f"/>
    <ellipse cx="0" cy="0" rx="11" ry="28" fill="none" stroke="#3b82f6" stroke-width="1.2"/>
    <polygon points="-11,-16 11,-16 0,-38" fill="#1d4ed8"/>
    <polygon points="-11,-16 11,-16 0,-38" fill="none" stroke="#3b82f6" stroke-width="1"/>
    <polygon points="-11,18 -22,34 0,24" fill="#7c3aed"/>
    <polygon points="11,18 22,34 0,24" fill="#7c3aed"/>

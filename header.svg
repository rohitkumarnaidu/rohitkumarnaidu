    <circle cx="34" cy="18" r="0.6"/><circle cx="89" cy="52" r="0.7"/><circle cx="145" cy="23" r="0.5"/>
    <circle cx="167" cy="89" r="0.6"/><circle cx="212" cy="145" r="0.7"/><circle cx="256" cy="34" r="0.5"/>
    <circle cx="289" cy="178" r="0.6"/><circle cx="334" cy="67" r="0.7"/><circle cx="378" cy="212" r="0.5"/>
    <circle cx="423" cy="89" r="0.6"/><circle cx="467" cy="256" r="0.7"/><circle cx="512" cy="145" r="0.5"/>
    <circle cx="556" cy="23" r="0.6"/><circle cx="601" cy="189" r="0.7"/><circle cx="645" cy="78" r="0.5"/>
    <circle cx="689" cy="234" r="0.6"/><circle cx="734" cy="112" r="0.7"/><circle cx="778" cy="267" r="0.5"/>

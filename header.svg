    <polygon points="-8,-12 8,-12 0,-28" fill="#1d4ed8"/>
    <ellipse cx="0" cy="28" rx="3.5" ry="8" fill="#f97316" opacity="0.9"/>
  </g>

  <!-- Main text: Name -->
  <text x="80" y="118" font-family="'Segoe UI','SF Pro Display',Arial,sans-serif"
    font-size="60" font-weight="700" fill="url(#nameGrad)" filter="url(#textglow)"
    letter-spacing="2">Rohith Kumar</text>

  <!-- Subtitle -->
  <text x="82" y="155" font-family="'Segoe UI',Arial,sans-serif"
    font-size="14" font-weight="400" fill="#7dd3fc" letter-spacing="4" opacity="0.9">
    FULL-STACK DEVELOPER  ·  AI ENTHUSIAST  ·  DIGITAL ALCHEMIST
  </text>

  <!-- Decorative line -->
  <line x1="80" y1="170" x2="700" y2="170" stroke="url(#lineGrad)" stroke-width="1.2"/>

  <!-- Skill chips -->

<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="60%" stop-color="#070b16"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <radialGradient id="neb1" cx="25%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a0533" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#020408" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb2" cx="78%" cy="55%" r="48%">
      <stop offset="0%" stop-color="#001a33" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#020408" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb3" cx="55%" cy="15%" r="38%">
      <stop offset="0%" stop-color="#0a1a0a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#020408" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb4" cx="45%" cy="80%" r="35%">
      <stop offset="0%" stop-color="#1a0a00" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#020408" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softglow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="textglow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="35%" stop-color="#60a5fa"/>
      <stop offset="65%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0"/>
      <stop offset="30%" stop-color="#818cf8"/>
      <stop offset="70%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="milky" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e1040" stop-opacity="0"/>
      <stop offset="30%" stop-color="#1e1040" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#001540" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#001540" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="planetGrad" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#3730a3"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f0a2e"/>
    </radialGradient>
    <radialGradient id="moonGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0d1b2e"/>
    </radialGradient>
